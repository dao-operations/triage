name: Taxonomy check

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  taxonomy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check taxonomy
        env:
          GH_TOKEN: ${{ github.token }}
        run: make check
