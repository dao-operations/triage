name: Bug
description: Report incorrect or broken public behavior.
title: "[Bug]: "
labels:
  - type:bug
body:
  - type: markdown
    attributes:
      value: |
        Use public-safe language only. Do not include exploitable vulnerability details. If the bug is security-sensitive, do not file it here.
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What is happening?
      placeholder: Describe the incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Public context
      description: Public links, screenshots, or environment details that are safe to share.
      placeholder: Add public references only.
    validations:
      required: false
  - type: textarea
    id: completion
    attributes:
      label: Completion signal
      description: How will we know this is fixed?
      placeholder: Describe the observable fix.
    validations:
      required: true
  - type: checkboxes
    id: public_safety
    attributes:
      label: Public safety
      options:
        - label: This issue contains only public-safe information and no exploitable security detail.
          required: true
