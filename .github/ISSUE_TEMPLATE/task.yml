name: Task
description: Track a concrete public work item.
title: "[Task]: "
labels:
  - type:task
body:
  - type: markdown
    attributes:
      value: |
        Use public-safe language only. Do not include secrets, signer details, private URLs, personal data, private commercial terms, or privileged legal/tax material.
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true when this is complete?
      placeholder: Describe the completed state.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Public context needed to understand the work.
      placeholder: Link public references where useful.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Observable completion signals.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: checkboxes
    id: public_safety
    attributes:
      label: Public safety
      options:
        - label: This issue contains only public-safe information.
          required: true
