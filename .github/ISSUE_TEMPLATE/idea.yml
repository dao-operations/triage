name: Idea
description: Capture a potential improvement or future work item.
title: "[Idea]: "
labels:
  - type:idea
body:
  - type: markdown
    attributes:
      value: |
        Ideas should be public-safe and lightweight. Triage can later split, refine, close, or convert them into concrete tasks.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What might be worth improving?
      placeholder: Describe the idea.
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Potential value
      description: Why might this be useful?
      placeholder: Describe the expected benefit.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes or constraints
      description: Public context, constraints, or open questions.
      placeholder: Add public references or constraints.
    validations:
      required: false
  - type: checkboxes
    id: public_safety
    attributes:
      label: Public safety
      options:
        - label: This issue contains only public-safe information.
          required: true
