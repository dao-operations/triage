# DAO-ops Triage configuration.
# Scripts read this file. Keep it aligned with SPEC.md.

[repo]
owner = "dao-operations"
name = "triage"
description = "Public DAO-ops triage and work tracker."

[project]
title = "DAO-ops Tracker"

[taxonomy]
namespaces = ["type:", "priority:", "scope:", "kind:", "target:", "needs:"]
single = ["type:", "priority:", "target:"]
required_open = ["type:"]
warn_open = ["scope:"]
forbidden_prefixes = ["status:", "br:", "area:"]
forbidden_labels = ["priority:p4", "br:unscheduled"]

[[fields]]
name = "Status"
type = "SINGLE_SELECT"
options = ["Inbox", "Backlog", "Next", "Doing", "Blocked", "Done"]
manual_verify = true

[[fields]]
name = "Priority"
type = "SINGLE_SELECT"
options = ["P0", "P1", "P2", "P3"]

[[fields]]
name = "Effort"
type = "SINGLE_SELECT"
options = ["S", "M", "L", "Unknown"]

[[fields]]
name = "Scope"
type = "SINGLE_SELECT"
options = ["styfi", "veyfi", "yeth", "teams", "ybc", "dao", "treasury", "governance", "operations"]

[[fields]]
name = "Target"
type = "SINGLE_SELECT"
options = ["BR3", "BR4", "BR5", "Later"]

[[fields]]
name = "Due"
type = "DATE"

[[labels]]
name = "type:task"
color = "ededed"
description = "Concrete work item."

[[labels]]
name = "type:bug"
color = "d73a4a"
description = "Broken or incorrect behavior."

[[labels]]
name = "type:idea"
color = "cfd3d7"
description = "Suggestion, rough improvement, or possible future work."

[[labels]]
name = "type:decision"
color = "fbca04"
description = "Public decision that needs an explicit answer."

[[labels]]
name = "priority:p0"
color = "b60205"
description = "Interrupt-level blocker or deadline risk."

[[labels]]
name = "priority:p1"
color = "d93f0b"
description = "Important and should be planned."

[[labels]]
name = "priority:p2"
color = "fbca04"
description = "Normal useful backlog work."

[[labels]]
name = "priority:p3"
color = "fef2c0"
description = "Opportunistic cleanup or polish."

[[labels]]
name = "scope:styfi"
color = "5319e7"
description = "styfi / styfi.yearn.fi."

