# DAO-ops Triage configuration.
# Scripts read this file. Keep it aligned with SPEC.md.

[repo]
owner = "dao-operations"
name = "triage"
description = "Public DAO-ops triage and work tracker."

[project]
title = "DAO-ops Tracker"

[taxonomy]
namespaces = ["type:", "priority:", "scope:", "kind:", "target:", "needs:"]
single = ["type:", "priority:", "target:"]
required_open = ["type:"]
warn_open = ["scope:"]
forbidden_prefixes = ["status:", "br:", "area:"]
forbidden_labels = [
  "priority:p4",
  "br:unscheduled",
  "bug",
  "documentation",
  "duplicate",
  "enhancement",
  "good first issue",
  "help wanted",
  "invalid",
  "question",
  "wontfix",
]

[[fields]]
name = "Status"
type = "SINGLE_SELECT"
options = ["Inbox", "Backlog", "Next", "Doing", "Blocked", "Done"]
manual_verify = true

[[fields]]
name = "Priority"
type = "SINGLE_SELECT"
options = ["P0", "P1", "P2", "P3"]

[[fields]]
name = "Effort"
type = "SINGLE_SELECT"
options = ["S", "M", "L", "Unknown"]

[[fields]]
name = "Scope"
type = "SINGLE_SELECT"
options = ["styfi", "veyfi", "yeth", "teams", "ybc", "dao", "treasury", "governance", "operations"]

[[fields]]
name = "Target"
type = "SINGLE_SELECT"
options = ["BR3", "BR4", "BR5", "Later"]

[[fields]]
name = "Due"
type = "DATE"

[[labels]]
name = "type:task"
color = "ededed"
description = "Concrete work item with a clear completion signal."

[[labels]]
name = "type:bug"
color = "d73a4a"
description = "Incorrect or broken behavior that should be fixed."

[[labels]]
name = "type:idea"
color = "cfd3d7"
description = "Potential improvement or future work needing refinement."

[[labels]]
name = "type:decision"
color = "fbca04"
description = "Decision record or open question requiring an explicit answer."

[[labels]]
name = "priority:p0"
color = "b60205"
description = "Urgent blocker, incident, deadline, or commitment risk."

[[labels]]
